<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3/14 - 3/17 白色騎人節 | 送愛抽萬鑽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF2D78;
            --rose-gold: #D4AF37;
            --text-dark: #4A4A4A;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --pink-glow: 0 8px 30px rgba(255, 45, 120, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(180deg, #FFF5F7 0%, #FFFFFF 100%);
            background-attachment: fixed;
            color: var(--text-dark);
        }

        .app-container { max-width: 600px; margin: 0 auto; padding: 20px 15px 60px; position: relative; }

        /* --- 多語系按鈕組 --- */
        .lang-switcher {
            position: fixed; top: 15px; right: 15px; z-index: 1000;
            display: flex; gap: 4px; background: rgba(255,255,255,0.9);
            padding: 4px; border-radius: 10px; border: 1px solid #FFE0E6;
        }
        .lang-btn {
            background: transparent; border: none; color: #8E8E93;
            padding: 6px 10px; font-size: 11px; cursor: pointer; border-radius: 6px;
            font-weight: 900; transition: 0.2s;
        }
        .lang-btn.active { background: var(--primary-pink); color: #FFF; }

        /* --- 毛玻璃卡片 --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 28px; padding: 30px 20px;
            margin-bottom: 25px; text-align: center;
            box-shadow: var(--pink-glow);
        }

        /* Hero */
        .hero-title { font-size: 2.3rem; font-weight: 900; margin: 0; color: var(--primary-pink); letter-spacing: -1px; }
        .hero-subtitle { font-size: 1rem; color: #8E8E93; margin: 10px 0 20px; font-weight: 700; }

        /* 計時器 */
        .timer-container { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .timer-box { background: #FFF; padding: 10px; border-radius: 15px; min-width: 65px; border: 1px solid #FFD1DC; }
        .timer-num { display: block; font-family: 'Montserrat', sans-serif; font-size: 1.6rem; font-weight: 900; color: var(--primary-pink); }
        .timer-unit { font-size: 0.75rem; color: #8E8E93; font-weight: bold; }

        /* 活動內容 */
        .rule-item { text-align: left; margin-bottom: 12px; padding-left: 30px; position: relative; font-size: 0.95rem; }
        .rule-item::before { content: '🌸'; position: absolute; left: 0; }
        .pink-highlight { color: var(--primary-pink); font-weight: 900; font-size: 1.15rem; }
        .gold-highlight { color: var(--rose-gold); font-weight: 900; font-size: 1.15rem; }

        /* --- 副活動卡片 (獨立流光) --- */
        .flash-sale-card {
            background: linear-gradient(135deg, #FFF0F3 0%, #FFFFFF 100%);
            border: 2px solid transparent; position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 45, 120, 0.1);
        }
        .flash-sale-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--primary-pink));
            animation: rotate 4s linear infinite; z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(1turn); } }

        /* 掃光按鈕 */
        .btn-cta {
            display: block; width: 100%; padding: 20px; background: var(--primary-pink);
            color: #FFF; text-decoration: none; font-size: 1.5rem; font-weight: 900;
            border-radius: 50px; position: relative; overflow: hidden;
            box-shadow: 0 10px 25px rgba(255, 45, 120, 0.4); border: none;
        }
        .btn-cta::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: sweep 3s infinite;
        }
        @keyframes sweep { 0% { left: -100%; } 50% { left: 100%; } 100% { left: 100%; } }

        /* Dashboard & FOMO */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .dash-val { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 900; color: var(--primary-pink); display: block; }
        .fomo-box {
            display: none; margin-top: 20px; padding: 15px; background: #FFF0F3;
            border: 2px solid var(--primary-pink); border-radius: 20px;
            color: var(--primary-pink); font-weight: 900; animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }

        /* Badges */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .badge-icon {
            width: 65px; height: 65px; margin: 0 auto 10px; background: #FFF;
            border: 2px solid var(--rose-gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 2rem; position: relative;
        }
        .badge-tag { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: var(--rose-gold); color: #FFF; font-size: 9px; padding: 2px 6px; border-radius: 6px; }

        /* Leaderboard */
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        .rank-table td { padding: 15px 10px; border-bottom: 1px solid #F5F5F7; font-size: 0.95rem; }
        .top-1 { color: gold; font-size: 1.3rem; font-weight: 900; }
    </style>
</head>
<body>

<div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('tw', this)">繁體</button>
    <button class="lang-btn" onclick="setLang('cn', this)">简体</button>
    <button class="lang-btn" onclick="setLang('en', this)">EN</button>
    <button class="lang-btn" onclick="setLang('jp', this)">日文</button>
</div>

<div class="app-container">
    
    <!-- 區塊 1 -->
    <header class="glass-card">
        <h1 class="hero-title" data-i18n="title">送愛抽萬鑽</h1>
        <div class="hero-subtitle" data-i18n="subtitle">3/14 - 3/17 白色騎人節</div>
        <div class="timer-container">
            <div class="timer-box"><span class="timer-num" id="d-val">00</span><span class="timer-unit" id="u-d">天</span></div>
            <div class="timer-box"><span class="timer-num" id="h-val">00</span><span class="timer-unit" id="u-h">時</span></div>
            <div class="timer-box"><span class="timer-num" id="m-val">00</span><span class="timer-unit" id="u-m">分</span></div>
            <div class="timer-box"><span class="timer-num" id="s-val">00</span><span class="timer-unit" id="u-s">秒</span></div>
        </div>
        <div id="ui-rules" style="text-align:left"></div>
    </header>

    <!-- 區塊 2 (加碼活動) -->
    <section class="glass-card flash-sale-card">
        <span style="background:var(--rose-gold); color:white; font-size:0.75rem; padding:4px 12px; border-radius:20px; font-weight:900" data-i18n="subAct">✨ 限時加碼 ✨</span>
        <div style="margin:15px 0; font-weight:900; color:var(--primary-pink); font-size:1.1rem" data-i18n="promo">🔥 鑽石快閃最高 10% OFF 🔥</div>
        <a href="https://swag.live/?campaign-id=checkout-diamondpack&campaign=" class="btn-cta" data-i18n="cta">💎 立即補鑽</a>
    </section>

    <!-- 區塊 3 (個人進度) -->
    <section class="glass-card">
        <h3 style="margin-top:0" data-i18n="dashTitle">個人戰況</h3>
        <div class="dash-grid">
            <div><span class="dash-val" id="user-diamond">---</span><span style="font-size:0.8rem; color:#999" data-i18n="lblD">累積消耗</span></div>
            <div><span class="dash-val" id="user-rank">---</span><span style="font-size:0.8rem; color:#999" data-i18n="lblR">目前排名</span></div>
        </div>
        <div id="fomo-alert" class="fomo-box">
            🚨 <span data-i18n="fomo1">戰況告急！您只差</span> <span id="gap-value">---</span> <span data-i18n="fomo2">鑽就能超越上一名！</span>
        </div>
    </section>

    <!-- 區塊 4 (徽章) -->
    <section class="glass-card">
        <h3 style="color:var(--rose-gold); margin-top:0" data-i18n="badgeTitle">榮耀限定徽章</h3>
        <div class="badge-grid" id="badge-container"></div>
    </section>

    <!-- 區塊 5 (榜單) -->
    <section class="glass-card">
        <h3 style="color:var(--primary-pink); margin-top:0" data-i18n="boardTitle">送禮榜 (TOP 20)</h3>
        <table class="rank-table"><tbody id="leaderboard-body"></tbody></table>
    </section>

    <!-- 區塊 6 -->
    <footer style="font-size:0.75rem; color:#AAA; padding:20px 10px; line-height:1.6" id="tc-content"></footer>
</div>

<script>
    const API_BASE = "https://white-valentine-api-905468082258.asia-east1.run.app";
    const END_DATE = new Date("2026-03-17T23:59:59+08:00").getTime();
    const urlParams = new URLSearchParams(window.location.search);
    const USER_ID = urlParams.get('user_id') || "";

    const i18n = {
        tw: {
            title: "送愛抽萬鑽", subtitle: "3/14 - 3/17 白色騎人節", uD: "天", uH: "時", uM: "分", uS: "秒",
            subAct: "✨ 限時加碼 ✨", promo: "🔥 鑽石快閃最高 10% OFF 🔥", cta: "💎 立即補鑽",
            dashTitle: "個人戰況 Dashboard", lblD: "累積消耗", lblR: "目前排名",
            fomo1: "戰況告急！您只差", fomo2: " 鑽擊敗上一名！立刻補鑽反超！",
            badgeTitle: "榮耀限定徽章", boardTitle: "白色騎士送禮榜 (TOP 20)",
            bSoon: "敬請期待", bNames: ["白色騎人國王", "白色騎人伯爵", "白色騎人紳士", "4-10名 侍衛", "11-50名 紀念"],
            rules: [
                '贈送<span class="pink-highlight">「白色騎人節」</span>系列禮物即可獲抽獎資格<span style="font-size:0.7rem">(含直播/聊天室)</span>',
                '隨機抽出 <span class="pink-highlight">50</span> 名幸運兒發放 <span class="pink-highlight">10,000</span> 鑽',
                '總榜 Top <span class="gold-highlight">50</span> 獲限定尊榮徽章'
            ],
            tc: ["僅限活動禮物。", "5分鐘更新一次。", "結果以官方為準。"]
        },
        cn: {
            title: "送爱抽万钻", subtitle: "3/14 - 3/17 白色骑人节", uD: "天", uH: "时", uM: "分", uS: "秒",
            subAct: "✨ 限时加码 ✨", promo: "🔥 钻石快闪最高 10% OFF 🔥", cta: "💎 立即补钻",
            dashTitle: "个人战况 Dashboard", lblD: "累积消耗", lblR: "目前排名",
            fomo1: "战况告急！您只差", fomo2: " 钻击败上一名！立刻补钻反超！",
            badgeTitle: "荣耀限定勋章", boardTitle: "白色骑士送礼榜 (TOP 20)",
            bSoon: "敬请期待", bNames: ["白色骑人国王", "白色骑人伯爵", "白色骑人绅士", "4-10名 侍卫", "11-50名 纪念"],
            rules: ['赠送指定系列礼物即可获抽奖资格', '随机抽出 50 名发放 10,000 钻', 'Top 50 获限定勋章'],
            tc: ["仅限活动礼物。", "數據每5分鐘更新。", "结果以官方为准。"]
        },
        en: {
            title: "Gift Love & Win 10k", subtitle: "3/14 - 3/17 White Valentine", uD: "D", uH: "H", uM: "M", uS: "S",
            subAct: "✨ LIMITED OFFER ✨", promo: "🔥 FLASH SALE 10% OFF 🔥", cta: "💎 RECHARGE",
            dashTitle: "My Dashboard", lblD: "Total", lblR: "Rank",
            fomo1: "URGENT! Only", fomo2: " left to beat the next rank! RECHARGE NOW!",
            badgeTitle: "Honorary Badges", boardTitle: "Leaderboard (TOP 20)",
            bSoon: "SOON", bNames: ["White King", "White Earl", "White Knight", "Royal Guard", "Memorial Badge"],
            rules: ['Gift <span class="pink-highlight">Valentine Series</span> to enter draw', '50 winners of <span class="pink-highlight">10,000</span> gems', 'Top <span class="gold-highlight">50</span> earn exclusive badges'],
            tc: ["Event gifts only.", "Updates every 5 mins.", "Final results by official."]
        },
        jp: {
            title: "愛を贈って1万ダイヤ", subtitle: "3/14 - 3/17 ホワイトデー", uD: "日", uH: "時", uM: "分", uS: "秒",
            subAct: "✨ 期間限定 ✨", promo: "🔥 最大 10% OFF 🔥", cta: "💎 チャージ",
            dashTitle: "マイステータス", lblD: "累計消費", lblR: "現在の順位",
            fomo1: "ピンチ！あと", fomo2: " ダイヤで逆転！今すぐチャージ！",
            badgeTitle: "栄誉限定バッジ", boardTitle: "ランキング (TOP 20)",
            bSoon: "期待して", bNames: ["キング", "伯爵", "紳士", "衛兵", "記念バッジ"],
            rules: ['対象ギフトを贈って抽選參加', '50名様に10,000ダイヤ贈呈', 'Top 50 限定バッジ贈呈'],
            tc: ["指定ギフトのみ対象。", "5分ごとに更新。", "公式記録に基づきます。"]
        }
    };

    function setLang(lang, btn) {
        const dict = i18n[lang];
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(dict[key]) el.innerText = dict[key];
        });

        document.getElementById('u-d').innerText = dict.uD;
        document.getElementById('u-h').innerText = dict.uH;
        document.getElementById('u-m').innerText = dict.uM;
        document.getElementById('u-s').innerText = dict.uS;

        document.getElementById('ui-rules').innerHTML = dict.rules.map(r => `<div class="rule-item">${r}</div>`).join('');
        document.getElementById('badge-container').innerHTML = dict.bNames.map(n => `
            <div style="background:#FFF9FA; border-radius:20px; padding:15px 5px; border:1px solid #FFE0E6">
                <div class="badge-icon">?<div class="badge-tag">${dict.bSoon}</div></div>
                <div style="font-size:0.75rem; font-weight:bold">${n}</div>
            </div>`).join('');
        document.getElementById('tc-content').innerHTML = `<h4>活動規則</h4>` + dict.tc.map(t => `<p>• ${t}</p>`).join('');
        
        fetchData();
    }

    async function fetchData() {
        try {
            // A. 排行榜
            const boardRes = await fetch(`${API_BASE}/get_leaderboard`);
            const boardJson = await boardRes.json();
            const list = boardJson.data || [];

            document.getElementById('leaderboard-body').innerHTML = list.map(u => `
                <tr>
                    <td class="${u.rank==1?'top-1':''}" width="50">#${u.rank}</td>
                    <td style="font-weight:700">${u.user_id.substring(0,8)}...</td>
                    <td style="text-align:right; font-weight:900; color:var(--primary-pink)">${u.diamond_cost.toLocaleString()} 💎</td>
                </tr>`).join('');

            // B. 個人進度
            if(USER_ID) {
                const uRes = await fetch(`${API_BASE}/get_user_rank?user_id=${USER_ID}`);
                const uJson = await uRes.json();
                const u = uJson.data;

                document.getElementById('user-diamond').innerText = u.diamond_cost.toLocaleString();
                document.getElementById('user-rank').innerText = u.rank;

                // FOMO 邏輯: 尋找上一名
                if(u.rank > 1 && u.rank <= 10) {
                    const prev = list.find(item => item.rank === u.rank - 1);
                    if(prev) {
                        const gap = prev.diamond_cost - u.diamond_cost;
                        document.getElementById('fomo-alert').style.display = "block";
                        document.getElementById('gap-value').innerText = gap.toLocaleString();
                    }
                } else { document.getElementById('fomo-alert').style.display = "none"; }
            }
        } catch(e) { console.error("API Error", e); }
    }

    function updateTimer() {
        const now = new Date().getTime();
        const dist = END_DATE - now;
        if (dist < 0) return;
        document.getElementById('d-val').innerText = Math.floor(dist / 86400000).toString().padStart(2,'0');
        document.getElementById('h-val').innerText = Math.floor((dist % 86400000) / 3600000).toString().padStart(2,'0');
        document.getElementById('m-val').innerText = Math.floor((dist % 3600000) / 60000).toString().padStart(2,'0');
        document.getElementById('s-val').innerText = Math.floor((dist % 60000) / 1000).toString().padStart(2,'0');
    }

    window.onload = () => { setLang('tw'); setInterval(updateTimer, 1000); setInterval(fetchData, 30000); updateTimer(); };
</script>

</body>
</html>
