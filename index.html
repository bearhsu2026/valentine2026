<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3/14 - 3/17 白色騎人節 | 解鎖女神絕對領域</title>
    <!-- 引入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #2A0000;
            --bg-crimson: #5B0000;
            --accent-gold: #D4AF37;
            --gold-shine: linear-gradient(90deg, #D4AF37, #F9E79F, #D4AF37);
            --neon-red: #FF0000;
            --bright-red: #E60000;
            --glass: rgba(0, 0, 0, 0.5);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-white: #FFFFFF;
        }

        /* --- 基礎背景與裝飾 --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, var(--bg-crimson) 0%, var(--bg-deep) 100%);
            background-attachment: fixed;
            color: var(--text-white);
            overflow-x: hidden;
        }
        
        /* 燙金閃爍背景點綴 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.1; z-index: -1;
        }

        .app-container {
            max-width: 600px; margin: 0 auto;
            min-height: 100vh; padding: 20px 15px 80px; position: relative;
        }

        /* --- 語系切換器 --- */
        .lang-switcher {
            position: fixed; top: 15px; right: 15px; z-index: 1000;
            display: flex; gap: 4px; background: rgba(0,0,0,0.8);
            padding: 4px; border-radius: 10px; border: 1px solid var(--accent-gold);
        }
        .lang-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.4);
            padding: 6px 10px; font-size: 11px; cursor: pointer; border-radius: 6px;
            font-weight: 900; transition: 0.3s;
        }
        .lang-btn.active { background: var(--accent-gold); color: #000; }

        /* --- 通用毛玻璃卡片 --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 30px 20px;
            margin-bottom: 25px; text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        /* --- 區塊 1: Hero --- */
        .date-badge { color: var(--accent-gold); font-weight: 900; letter-spacing: 2px; font-size: 1rem; margin-bottom: 5px; display: block; }
        .hero-title { font-size: 2.8rem; font-weight: 900; margin: 0; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .hero-subtitle { font-size: 1rem; color: #AAA; font-style: italic; margin-bottom: 20px; }

        /* 計時器樣式 */
        .countdown-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .timer-box {
            background: rgba(255,0,0,0.1); border: 1px solid var(--bright-red);
            min-width: 60px; padding: 10px 5px; border-radius: 12px;
            box-shadow: 0 0 10px var(--bright-red);
        }
        .timer-num { display: block; font-family: 'Montserrat', sans-serif; font-size: 1.6rem; font-weight: 900; color: #fff; }
        .timer-unit { font-size: 0.7rem; color: var(--accent-gold); font-weight: bold; }

        .lottery-rules { text-align: left; padding: 0 10px; list-style: none; margin: 0; font-size: 0.95rem; line-height: 1.8; }
        .rule-item { margin-bottom: 12px; position: relative; padding-left: 25px; }
        .rule-item::before { content: '✦'; position: absolute; left: 0; color: var(--accent-gold); }
        .gold-bold { color: var(--accent-gold); font-weight: 900; font-size: 1.1rem; }

        /* --- 區塊 2: Flash Sale --- */
        .flash-card {
            background: linear-gradient(135deg, rgba(255,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            border: 2px solid transparent; position: relative; overflow: hidden;
        }
        /* 流光邊框 */
        .flash-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--accent-gold));
            animation: rotateBorder 4s linear infinite; z-index: -1;
        }
        @keyframes rotateBorder { 100% { transform: rotate(1turn); } }

        .btn-red {
            display: block; width: 100%; padding: 20px;
            background: linear-gradient(180deg, #ff3333 0%, #990000 100%);
            color: white; text-decoration: none; font-size: 1.5rem; font-weight: 900;
            border-radius: 50px; box-shadow: 0 5px 20px rgba(255,0,0,0.4);
            border: 1px solid #ff6666; position: relative; overflow: hidden; transition: 0.2s;
        }
        .btn-red::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: sweep 3s infinite;
        }
        @keyframes sweep { 0% { left: -100%; } 50% { left: 100%; } 100% { left: 100%; } }

        /* --- 區塊 3: Dashboard & FOMO --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .dash-val { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 900; color: var(--accent-gold); display: block; }
        .dash-lbl { font-size: 0.8rem; color: #888; }

        .fomo-alert {
            display: none; margin-top: 25px; padding: 20px;
            background: rgba(255, 0, 0, 0.15); border: 2px solid var(--neon-red);
            border-radius: 20px; color: #fff; font-weight: 900;
            box-shadow: 0 0 15px var(--neon-red); animation: pulseAlert 0.8s infinite alternate;
        }
        @keyframes pulseAlert { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.03); } }

        /* --- 區塊 4: Badges --- */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 25px; }
        .badge-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px 5px; border: 1px solid rgba(255,255,255,0.05); }
        .badge-icon {
            width: 70px; height: 70px; margin: 0 auto 10px;
            background: radial-gradient(circle, #444, #111);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--accent-gold); border: 2px solid var(--accent-gold);
            position: relative;
        }
        .badge-tag {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--gold-shine); color: #000; font-size: 9px;
            font-weight: 900; padding: 2px 8px; border-radius: 10px; white-space: nowrap;
        }

        /* --- 區塊 5: Leaderboard --- */
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .rank-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-table td { padding: 18px 10px; font-size: 0.95rem; }
        .rank-num { font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; width: 60px; }
        .top-1 { color: #FFD700; font-size: 1.4rem; text-shadow: 0 0 10px #FFD700; }
        .top-2 { color: #E0E0E0; }
        .top-3 { color: #CD7F32; }

        /* --- Footer --- */
        .footer-terms { font-size: 0.75rem; color: #888; text-align: left; padding: 0 10px; }
        .footer-terms h4 { color: #AAA; text-align: center; }

        .skeleton { background: rgba(255,255,255,0.1); border-radius: 4px; animation: pulse 1.5s infinite; height: 20px; display: inline-block; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

<div class="lang-switcher">
    <button class="lang-btn active" onclick="switchLang('tw', this)">繁體</button>
    <button class="lang-btn" onclick="switchLang('cn', this)">简体</button>
    <button class="lang-btn" onclick="switchLang('en', this)">EN</button>
    <button class="lang-btn" onclick="switchLang('jp', this)">日文</button>
</div>

<div class="app-container">
    
    <!-- Section 1 -->
    <header class="glass-card">
        <span class="date-badge" data-i18n="dateRange">3/14 - 3/17 白色騎人節</span>
        <h1 class="hero-title" data-i18n="mainTitle">送禮抽萬鑽</h1>
        <div class="hero-subtitle" data-i18n="heroSub">解鎖女神的絕對領域</div>
        
        <div class="countdown-container">
            <div class="timer-box"><span class="timer-num" id="d-val">00</span><span class="timer-unit" data-i18n="unitD">天</span></div>
            <div class="timer-box"><span class="timer-num" id="h-val">00</span><span class="timer-unit" data-i18n="unitH">時</span></div>
            <div class="timer-box"><span class="timer-num" id="m-val">00</span><span class="timer-unit" data-i18n="unitM">分</span></div>
            <div class="timer-box"><span class="timer-num" id="s-val">00</span><span class="timer-unit" data-i18n="unitS">秒</span></div>
        </div>

        <ul class="lottery-rules" id="ui-rules"></ul>
    </header>

    <!-- Section 2: Flash Sale -->
    <section class="glass-card flash-card">
        <span style="color:var(--accent-gold); font-weight:900" data-i18n="subActTag">✨ 限時加碼 ✨</span>
        <div style="margin:15px 0; font-weight:900; font-size:1.1rem; color:var(--accent-gold)" data-i18n="flashPromo">🔥 3/14-3/17 白色騎人節 鑽石快閃最高 10% OFF 🔥</div>
        <a href="https://swag.live/?campaign-id=checkout-diamondpack&campaign=" class="btn-red" data-i18n="ctaBtn">💎 立即補鑽</a>
    </section>

    <!-- Section 3: Dashboard & FOMO -->
    <section class="glass-card">
        <h3 style="margin-top:0" data-i18n="dashTitle">個人戰況看板</h3>
        <div class="stats-grid">
            <div class="dash-item">
                <span class="dash-val" id="user-diamond">---</span>
                <span class="dash-lbl" data-i18n="lblD">累積消耗鑽石</span>
            </div>
            <div class="dash-item">
                <span class="dash-val" id="user-rank">---</span>
                <span class="dash-lbl" data-i18n="lblR">目前排名</span>
            </div>
        </div>
        
        <div id="fomo-alert" class="fomo-alert">
            🚨 <span data-i18n="fomo1">戰況告急！您只差</span> 
            <span id="gap-value" class="gold-bold">---</span> 
            <span data-i18n="fomo2">鑽就能擊敗上一名！立刻補鑽反超，奪取更高榮耀！</span>
        </div>
    </section>

    <!-- Section 4: Badges -->
    <section class="glass-card">
        <h3 style="color:var(--accent-gold); margin-top:0" data-i18n="badgeTitle">榮耀限定徽章</h3>
        <p style="font-size:0.8rem; opacity:0.6; margin-bottom:20px" data-i18n="badgeDesc">活動總榜前 50 名，可永久解鎖對應的限定徽章</p>
        <div class="badge-grid" id="badge-container"></div>
    </section>

    <!-- Section 5: Ranking -->
    <section class="glass-card">
        <h3 style="margin-top:0; color:var(--neon-red)" data-i18n="boardTitle">白色騎士送禮榜 (TOP 20)</h3>
        <table class="rank-table"><tbody id="leaderboard-body"></tbody></table>
    </section>

    <!-- Section 6: Footer -->
    <footer class="footer-terms">
        <h4 data-i18n="tcTitle">活動規則與注意事項</h4>
        <div id="tc-list"></div>
    </footer>
</div>

<script>
    // --- Configuration & i18n ---
    const API_BASE = "https://white-valentine-api-905468082258.asia-east1.run.app";
    const END_DATE = new Date("2026-03-17T23:59:59+08:00").getTime();
    const urlParams = new URLSearchParams(window.location.search);
    const USER_ID = urlParams.get('user_id') || "";

    const i18n = {
        tw: {
            dateRange: "3/14 - 3/17 白色騎人節", mainTitle: "送禮抽萬鑽", heroSub: "解鎖女神的絕對領域",
            unitD: "天", unitH: "時", unitM: "分", unitS: "秒",
            subActTag: "✨ 限時加碼 ✨", flashPromo: "🔥 3/14-3/17 鑽石快閃最高 10% OFF 🔥", ctaBtn: "💎 立即補鑽",
            dashTitle: "個人戰況看板", lblD: "累積消耗鑽石", lblR: "目前排名",
            fomo1: "戰況告急！您只差", fomo2: " 鑽就能擊敗上一名！立刻補鑽反超！",
            badgeTitle: "榮耀限定徽章", badgeDesc: "活動總榜前 50 名，可永久解鎖",
            wait: "敬請期待", bNames: ["白色騎人國王", "白色騎人伯爵", "白色騎人紳士", "4-10名 侍衛", "11-50名 紀念"],
            boardTitle: "白色騎士送禮榜 (TOP 20)", tcTitle: "活動規則與注意事項",
            rules: [
                '贈送<span class="gold-bold">「白色騎人節」</span>系列禮物獲抽獎資格<span style="font-size:0.7rem">(含直播/聊天室)</span>',
                '隨機抽出 <span class="gold-bold">50</span> 名發放 <span class="gold-bold">10,000</span> 鑽',
                '總榜 Top <span class="gold-bold">50</span> 獲限定尊榮徽章'
            ],
            tc: ["僅限活動系列禮物。", "每 5 分鐘更新一次。", "結果以官方計算為準。"]
        },
        cn: {
            dateRange: "3/14 - 3/17 白色骑人节", mainTitle: "送礼抽万钻", heroSub: "解锁女神的绝对领域",
            unitD: "天", unitH: "时", unitM: "分", unitS: "秒",
            subActTag: "✨ 限时加码 ✨", flashPromo: "🔥 3/14-3/17 钻石快闪最高 10% OFF 🔥", ctaBtn: "💎 立即补钻",
            dashTitle: "个人战况看板", lblD: "累积消耗钻石", lblR: "目前排名",
            fomo1: "战况告急！您只差", fomo2: " 钻就能击败上一名！立刻补钻反超！",
            badgeTitle: "荣耀限定勋章", badgeDesc: "活动总榜前 50 名，可永久解锁",
            wait: "敬请期待", bNames: ["白色骑人国王", "白色骑人伯爵", "白色骑人绅士", "4-10名 侍卫", "11-50名 纪念"],
            boardTitle: "白色骑士送礼榜 (TOP 20)", tcTitle: "活动规则与注意事项",
            rules: ['贈送「白色骑人节」系列礼物獲抽獎資格', '隨機抽出 50 名發放 10,000 鑽', '總榜 Top 50 獲限定勋章'],
            tc: ["仅限活动礼物。", "每 5 分钟更新一次。", "结果以官方计算为准。"]
        },
        en: {
            dateRange: "3/14 - 3/17 White Valentine", mainTitle: "Gift & Win 10k", heroSub: "Unlock Her Secret Domain",
            unitD: "D", unitH: "H", unitM: "M", unitS: "S",
            subActTag: "✨ LIMITED OFFER ✨", flashPromo: "🔥 Up to 10% OFF Flash Sale 🔥", ctaBtn: "💎 RECHARGE",
            dashTitle: "Personal Dashboard", lblD: "Diamonds Used", lblR: "Current Rank",
            fomo1: "URGENT! Only", fomo2: " more gems to beat the next rank!",
            badgeTitle: "Honorary Badges", badgeDesc: "Top 50 users unlock permanently",
            wait: "SOON", bNames: ["White King", "White Earl", "White Knight", "White Guard", "Memorial"],
            boardTitle: "Leaderboard (TOP 20)", tcTitle: "Terms & Conditions",
            rules: ['Gift <span class="gold-bold">White Rider</span> items to enter', 'Lucky draw <span class="gold-bold">50</span> winners for <span class="gold-bold">10k</span> gems', 'Top <span class="gold-bold">50</span> earn exclusive badges'],
            tc: ["Specific gifts only.", "Updates every 5 mins.", "Final results by official records."]
        },
        jp: {
            dateRange: "3/14 - 3/17 ホワイトデー", mainTitle: "1万ダイヤを当てる", heroSub: "彼女の聖域を解禁せよ",
            unitD: "日", unitH: "時", unitM: "分", unitS: "秒",
            subActTag: "✨ 限定イベント ✨", flashPromo: "🔥 最大 10% OFF フラッシュセール 🔥", ctaBtn: "💎 チャージ",
            dashTitle: "マイステータス", lblD: "累計消費ダイヤ", lblR: "現在の順位",
            fomo1: "ピンチ！あと", fomo2: " ダイヤで逆転！今すぐチャージ！",
            badgeTitle: "栄誉限定バッジ", badgeDesc: "トップ 50 名が永久解禁",
            wait: "期待してね", bNames: ["ホワイトキング", "ホワイト伯爵", "ホワイト騎士", "衛兵", "記念バッジ"],
            boardTitle: "ランキング (TOP 20)", tcTitle: "注意事項",
            rules: ['指定ギフトで抽選に参加', '抽選で <span class="gold-bold">50</span> 名様に <span class="gold-bold">1万</span> ダイヤ贈呈', 'Top <span class="gold-bold">50</span> 限定バッジ贈呈'],
            tc: ["対象ギフトのみ。", "5分ごとに更新。", "公式記録に基づきます。"]
        }
    };

    let curLang = 'tw';

    // --- Core Functions ---
    function switchLang(lang, btn) {
        curLang = lang;
        const dict = i18n[lang];
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(dict[key]) el.innerHTML = dict[key];
        });

        document.getElementById('ui-rules').innerHTML = dict.rules.map(r => `<li class="rule-item">${r}</li>`).join('');
        document.getElementById('tc-list').innerHTML = dict.tc.map(t => `<p>• ${t}</p>`).join('');
        document.getElementById('badge-container').innerHTML = dict.bNames.map(n => `
            <div class="badge-card">
                <div class="badge-icon">?<div class="badge-tag">${dict.wait}</div></div>
                <div style="font-size:0.7rem; font-weight:bold">${n}</div>
            </div>`).join('');
        
        fetchData();
    }

    const getVal = (u) => parseInt(u?.diamond_cost ?? u?.score ?? u?.amount ?? 0);

    async function fetchData() {
        try {
            const boardRes = await fetch(`${API_BASE}/get_leaderboard`);
            const boardJson = await boardRes.json();
            const list = boardJson.data || [];

            document.getElementById('leaderboard-body').innerHTML = list.slice(0, 20).map(u => `
                <tr>
                    <td class="rank-num ${u.rank<=3?'top-'+u.rank:''}">#${u.rank}</td>
                    <td style="font-weight:700">${(u.user_id||"---").substring(0,10)}...</td>
                    <td style="text-align:right; font-weight:900; color:var(--accent-gold)">${getVal(u).toLocaleString()} 💎</td>
                </tr>`).join('');

            if(USER_ID) {
                const uRes = await fetch(`${API_BASE}/get_user_rank?user_id=${USER_ID}`);
                const uJson = await uRes.json();
                const u = uJson.data || uJson;
                
                document.getElementById('user-diamond').innerText = getVal(u).toLocaleString();
                document.getElementById('user-rank').innerText = u.rank || "---";

                if(u.rank > 1 && u.rank <= 10) {
                    const prev = list.find(item => item.rank == u.rank - 1);
                    if(prev) {
                        const gap = getVal(prev) - getVal(u);
                        document.getElementById('fomo-alert').style.display = "block";
                        document.getElementById('gap-value').innerText = gap.toLocaleString();
                    }
                } else { document.getElementById('fomo-alert').style.display = "none"; }
            }
        } catch(e) { console.error("API Err", e); }
    }

    function updateTimer() {
        const now = new Date().getTime();
        const dist = END_DATE - now;
        if (dist < 0) return;
        document.getElementById('d-val').innerText = Math.floor(dist / 86400000).toString().padStart(2,'0');
        document.getElementById('h-val').innerText = Math.floor((dist % 86400000) / 3600000).toString().padStart(2,'0');
        document.getElementById('m-val').innerText = Math.floor((dist % 3600000) / 60000).toString().padStart(2,'0');
        document.getElementById('s-val').innerText = Math.floor((dist % 60000) / 1000).toString().padStart(2,'0');
    }

    window.onload = () => {
        switchLang('tw');
        setInterval(updateTimer, 1000);
        setInterval(fetchData, 30000);
        updateTimer();
    };
</script>

</body>
</html>
