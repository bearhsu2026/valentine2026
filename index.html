<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3/14 - 3/17 白色騎人節 | 解鎖女神絕對領域</title>
    <!-- 引入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #5B0000 0%, #2A0000 100%);
            --accent-gold: #D4AF37;
            --gold-shine: linear-gradient(90deg, #D4AF37, #F9E79F, #D4AF37);
            --bright-red: #FF0000;
            --deep-red: #B30000;
            --glass: rgba(0, 0, 0, 0.45);
            --glass-border: rgba(212, 175, 55, 0.25);
            --text-white: #FFFFFF;
            --neon-red: #FF3131;
        }

        /* --- 奢華背景與裝飾 --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* 背景星芒裝飾 */
        .stars-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; pointer-events: none; z-index: -1;
        }

        .app-container {
            max-width: 600px; margin: 0 auto;
            min-height: 100vh; padding: 20px 15px 80px; position: relative;
        }

        /* --- 語系切換器 --- */
        .lang-switcher {
            position: fixed; top: 15px; right: 15px; z-index: 1000;
            display: flex; gap: 4px; background: rgba(0,0,0,0.7);
            padding: 4px; border-radius: 12px; border: 1px solid var(--accent-gold);
            backdrop-filter: blur(10px);
        }
        .lang-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.4);
            padding: 6px 10px; font-size: 11px; cursor: pointer; border-radius: 8px;
            font-weight: 900; transition: 0.3s;
        }
        .lang-btn.active { background: var(--accent-gold); color: #000; }

        /* --- 通用毛玻璃卡片 --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 30px 20px;
            margin-bottom: 25px; text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(179, 0, 0, 0.2);
        }

        /* --- 區塊 1: Hero --- */
        .date-label { color: var(--accent-gold); font-weight: 900; letter-spacing: 2px; font-size: 1rem; margin-bottom: 5px; display: block; }
        .hero-title { font-size: 2.8rem; font-weight: 900; margin: 0; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .hero-subtitle { font-size: 1.1rem; color: #AAA; font-style: italic; margin-bottom: 25px; letter-spacing: 1px; }

        /* 倒數計時器 */
        .timer-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .timer-box {
            background: rgba(255,0,0,0.1); border: 1px solid var(--bright-red);
            min-width: 65px; padding: 12px 5px; border-radius: 12px;
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
        }
        .timer-num { display: block; font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1; margin-bottom: 4px; }
        .timer-unit { font-size: 0.75rem; color: var(--accent-gold); font-weight: bold; }

        /* 活動辦法列表 */
        .rule-list { text-align: left; padding: 0 10px; list-style: none; margin: 0; font-size: 0.95rem; line-height: 1.8; }
        .rule-item { margin-bottom: 12px; position: relative; padding-left: 25px; }
        .rule-item::before { content: '✦'; position: absolute; left: 0; color: var(--accent-gold); }
        .gold-num { color: var(--accent-gold); font-weight: 900; font-size: 1.15rem; text-shadow: 0 0 5px rgba(212,175,55,0.5); }
        .sub-note { font-size: 0.75rem; opacity: 0.5; display: inline-block; margin-left: 5px; }

        /* --- 區塊 2: Flash Sale Card (獨立流光卡片) --- */
        .flash-sale-card {
            background: linear-gradient(135deg, rgba(179,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%);
            border: 2px solid transparent; position: relative; overflow: hidden;
            border-radius: 32px; padding: 35px 25px; margin-bottom: 30px;
        }
        .flash-sale-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--accent-gold));
            animation: rotateBorder 4s linear infinite; z-index: -1;
        }
        @keyframes rotateBorder { 100% { transform: rotate(1turn); } }

        .btn-cta {
            display: block; width: 100%; padding: 22px;
            background: linear-gradient(180deg, var(--bright-red) 0%, var(--deep-red) 100%);
            color: white; text-decoration: none; font-size: 1.6rem; font-weight: 900;
            border-radius: 50px; box-shadow: 0 10px 30px rgba(255,0,0,0.6);
            border: 1px solid #ff6666; position: relative; overflow: hidden;
            animation: pulseBreath 2s infinite ease-in-out;
        }
        .btn-cta::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: sweep 3.5s infinite;
        }
        @keyframes sweep { 0% { left: -100%; } 40% { left: 100%; } 100% { left: 100%; } }
        @keyframes pulseBreath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* --- 區塊 3: Dashboard & FOMO --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .dash-val { font-family: 'Montserrat', sans-serif; font-size: 2rem; font-weight: 900; color: var(--accent-gold); display: block; }
        .dash-lbl { font-size: 0.85rem; color: #888; font-weight: bold; }

        .fomo-alert {
            display: none; margin-top: 25px; padding: 20px;
            background: rgba(255, 0, 0, 0.2); border: 2px solid var(--neon-red);
            border-radius: 20px; color: #fff; font-weight: 900;
            box-shadow: 0 0 25px var(--neon-red); animation: urgentFlash 0.8s infinite alternate;
        }
        @keyframes urgentFlash { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.04); } }

        /* --- 區塊 4: Badges --- */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 25px; }
        .badge-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px 5px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .badge-icon {
            width: 70px; height: 70px; margin: 0 auto 10px;
            background: radial-gradient(circle, #444, #111);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: var(--accent-gold); border: 2px solid var(--accent-gold);
            position: relative;
        }
        .coming-soon-tag {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--gold-shine); color: #000; font-size: 9px;
            font-weight: 900; padding: 2px 8px; border-radius: 10px; white-space: nowrap;
        }
        .badge-name { font-size: 0.75rem; font-weight: bold; line-height: 1.2; display: block; margin-top: 8px; }

        /* --- 區塊 5: Leaderboard --- */
        .board-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .board-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .board-table td { padding: 18px 10px; font-size: 1rem; }
        .rank-col { font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; width: 65px; }
        .rank-1 { color: #FFD700; font-size: 1.6rem; text-shadow: 0 0 12px #FFD700; }
        .rank-2 { color: #E0E0E0; font-size: 1.3rem; }
        .rank-3 { color: #CD7F32; font-size: 1.2rem; }

        /* --- 區塊 6: Footer --- */
        .tc-footer { font-size: 0.75rem; color: #777; text-align: left; padding: 0 10px; line-height: 1.8; margin-top: 30px; }
        .tc-footer h4 { color: #999; text-align: center; margin-bottom: 15px; }

        /* 骨架屏 */
        .skeleton { background: rgba(255,255,255,0.1); border-radius: 4px; animation: pulseSkel 1.5s infinite; height: 20px; display: inline-block; }
        @keyframes pulseSkel { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    </style>
</head>

    // --- Configuration ---
    const API_BASE = "https://white-valentine-api-905468082258.asia-east1.run.app";
    const END_DATE = new Date("2026-03-17T23:59:59+08:00").getTime();
    const urlParams = new URLSearchParams(window.location.search);
    const USER_ID = urlParams.get('user_id') || "";

    // --- i18n Dictionary ---
    const i18n = {
        tw: {

            dashTitle: "個人戰況看板", lblD: "累積消耗鑽石", lblR: "目前排名",

            wait: "敬請期待", boardTitle: "白色騎士送禮榜 (TOP 20)", tcTitle: "活動規則與注意事項",
            bNames: ["白色騎人國王", "白色騎人伯爵", "白色騎人紳士", "白色騎人侍衛", "白色騎人紀念"],
            rules: [
                '贈送<span class="gold-num">「白色騎人節」</span>系列禮物獲抽獎資格<span class="sub-note">(含直播及聊天室)</span>',
                '隨機抽出 <span class="gold-num">50</span> 名發放 <span class="gold-num">10,000</span> 鑽',
                '總榜 Top <span class="gold-num">50</span> 獲限定尊榮徽章'
            ],
            tc: ["僅限送活動系列禮物。", "排行榜僅計算白色騎人禮物。", "每 5 分鐘更新一次。", "獎鑽將於 5 工作日內發放。", "徽章將於 3 工作日內發放。", "最終結果以官方計算為準。"]
        },
        cn: {
            dateRange: "3/14 - 3/17 白色骑人节", mainTitle: "送礼抽万钻", heroSub: "解锁女神的绝对领域",
            uD: "天", uH: "时", uM: "分", uS: "秒",
            subAct: "✨ 限时加码 ✨", flashPromo: "🔥 3/14-3/17 钻石快闪最高 10% OFF 🔥", ctaBtn: "💎 立即补钻",
            dashTitle: "个人战况看板", lblD: "累积消耗钻石", lblR: "目前排名",
            fomo1: "战况告急！您只差", fomo2: " 钻就能击败上一名！立刻补钻反超！",
            badgeTitle: "荣耀限定勋章", badgeDesc: "活动总榜前 50 名，可永久解锁对应的限定勋章",
            wait: "敬请期待", boardTitle: "白色骑士送礼榜 (TOP 20)", tcTitle: "活动规则与注意事项",
            bNames: ["白色骑人国王", "白色骑人伯爵", "白色骑人绅士", "白色骑人侍卫", "白色骑人纪念"],
            rules: ['贈送「白色骑人节」系列礼物獲抽獎資格', '隨機抽出 50 名發放 10,000 鑽', '總榜 Top 50 獲限定勋章'],
            tc: ["仅限活动礼物。", "每 5 分钟更新一次。", "结果以官方计算为准。"]
        },
        en: {
            dateRange: "3/14 - 3/17 White Valentine", mainTitle: "Gift & Win 10k", heroSub: "Unlock Her Secret Domain",
            uD: "D", uH: "H", uM: "M", uS: "S",
            subAct: "✨ LIMITED OFFER ✨", flashPromo: "🔥 Up to 10% OFF Flash Sale 🔥", ctaBtn: "💎 RECHARGE",
            dashTitle: "My Dashboard", lblD: "Total Diamonds", lblR: "Rank",
            fomo1: "URGENT! Only", fomo2: " more gems to beat the next rank!",
            badgeTitle: "Honorary Badges", badgeDesc: "Top 50 earn permanent badges",
            wait: "SOON", boardTitle: "Leaderboard (TOP 20)", tcTitle: "Terms & Conditions",
            bNames: ["White King", "White Earl", "White Knight", "White Guard", "Commemorative"],
            rules: ['Gift <span class="gold-num">White Rider</span> items to enter', 'Lucky draw <span class="gold-num">50</span> winners for <span class="gold-num">10k</span> gems', 'Top <span class="gold-num">50</span> earn exclusive badges'],
            tc: ["Specific gifts only.", "Updates every 5 mins.", "Final results by official records."]
        },
        jp: {
            dateRange: "3/14 - 3/17 ホワイトデー", mainTitle: "1万ダイヤを当てる", heroSub: "彼女の聖域を解禁せよ",
            uD: "日", uH: "時", uM: "分", uS: "秒",
            subAct: "✨ 限定イベント ✨", flashPromo: "🔥 最大 10% OFF フラッシュセール 🔥", ctaBtn: "💎 チャージ",
            dashTitle: "マイステータス", lblD: "累計消費ダイヤ", lblR: "現在の順位",
            fomo1: "ピンチ！あと", fomo2: " ダイヤで逆転！今すぐチャージ！",
            badgeTitle: "栄誉限定バッジ", badgeDesc: "トップ 50 名が永久解禁",
            wait: "期待してね", boardTitle: "ランキング (TOP 20)", tcTitle: "注意事項",
            bNames: ["ホワイトキング", "ホワイト伯爵", "ホワイト騎士", "衛兵", "記念バッジ"],
            rules: ['指定ギフトで抽選に参加', '抽選で <span class="gold-num">50</span> 名様に <span class="gold-num">1万</span> ダイヤ贈呈', 'Top <span class="gold-num">50</span> 限定バッジ贈呈'],
            tc: ["対象ギフトのみ。", "5分ごとに更新。", "公式記録に基づきます。"]
        }
    };

    // --- Logic Functions ---

    function setLang(lang, btn) {
        const dict = i18n[lang];
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        // 更新帶有 data-i18n 的靜態文字
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(dict[key]) el.innerText = dict[key];
        });

        // 計時器單位
        document.getElementById('u-d').innerText = dict.uD;
        document.getElementById('u-h').innerText = dict.uH;
        document.getElementById('u-m').innerText = dict.uM;
        document.getElementById('u-s').innerText = dict.uS;

        // 規則列表
        document.getElementById('ui-rules').innerHTML = dict.rules.map(r => `<li class="rule-item">${r}</li>`).join('');
        document.getElementById('tc-list').innerHTML = dict.tc.map(t => `<p>• ${t}</p>`).join('');

        // 徽章區塊
        const badgesHtml = dict.bNames.map((name, i) => `
            <div class="badge-card">
                <div class="badge-icon">?<div class="coming-soon-tag">${dict.wait}</div></div>
                <span class="badge-name">${name}</span>
            </div>
        `).join('');
        document.getElementById('badge-container').innerHTML = badgesHtml;
        
        fetchData();
    }

    const normalizeScore = (u) => parseInt(u?.diamond_cost ?? u?.score ?? u?.amount ?? 0);

    async function fetchData() {
        try {
            // 1. 抓取排行榜 (context for FOMO)
            const boardRes = await fetch(`${API_BASE}/get_leaderboard`);
            const boardJson = await boardRes.json();
            const list = boardJson.data || (Array.isArray(boardJson) ? boardJson : []);

            // 渲染榜單
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = list.slice(0, 20).map(u => `
                <tr>
                    <td class="rank-col ${u.rank<=3 ? 'rank-'+u.rank : ''}">#${u.rank}</td>
                    <td style="font-weight:700">${(u.user_id || "---").substring(0,10)}...</td>
                    <td style="text-align:right; font-weight:900; color:var(--accent-gold)">${normalizeScore(u).toLocaleString()} 💎</td>
                </tr>`).join('');

            // 2. 抓取個人數據
            if(USER_ID) {
                const uRes = await fetch(`${API_BASE}/get_user_rank?user_id=${USER_ID}`);
                const uJson = await uRes.json();
                const u = uJson.data || uJson;
                
                document.getElementById('user-diamond').innerText = normalizeScore(u).toLocaleString();
                document.getElementById('user-rank').innerText = u.rank || "---";

                // FOMO 邏輯: 尋找上一名計算差距 (僅限 2-10 名)
                const myRank = parseInt(u.rank);
                if(myRank > 1 && myRank <= 10) {
                    const prevUser = list.find(item => item.rank == myRank - 1);
                    if(prevUser) {
                        const gap = normalizeScore(prevUser) - normalizeScore(u);
                        document.getElementById('fomo-alert').style.display = "block";
                        document.getElementById('gap-value').innerText = gap.toLocaleString();
                    }
                } else { document.getElementById('fomo-alert').style.display = "none"; }
            }
        } catch(e) { console.error("API Error:", e); }
    }

    function updateTimer() {
        const now = new Date().getTime();
        const dist = END_DATE - now;
        if (dist < 0) return;
        document.getElementById('d-val').innerText = Math.floor(dist / 86400000).toString().padStart(2,'0');
        document.getElementById('h-val').innerText = Math.floor((dist % 86400000) / 3600000).toString().padStart(2,'0');
        document.getElementById('m-val').innerText = Math.floor((dist % 3600000) / 60000).toString().padStart(2,'0');
        document.getElementById('s-val').innerText = Math.floor((dist % 60000) / 1000).toString().padStart(2,'0');
    }

    window.onload = () => {
        setLang('tw');
        setInterval(updateTimer, 1000);
        setInterval(fetchData, 30000); // 30秒更新一次
        updateTimer();
    };
</script>

</body>
</html>
