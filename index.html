<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送愛抽萬鑽 - 白色騎人節</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #fce4ec;
            --accent-gold: #d4af37;
            --white: #ffffff;
            --text-dark: #4a4a4a;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #fff5f7 0%, #fce4ec 100%);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* I18n Buttons */
        .lang-switcher {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            display: flex; gap: 5px;
        }
        .lang-btn {
            background: var(--white); border: 1px solid var(--primary-pink);
            color: var(--primary-pink); padding: 4px 8px; border-radius: 12px;
            font-size: 10px; cursor: pointer; transition: 0.3s;
        }
        .lang-btn.active { background: var(--primary-pink); color: white; }

        /* Layout */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* Hero Section */
        .hero { text-align: center; padding: 40px 0 20px; }
        .hero h1 { color: var(--primary-pink); margin: 0; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.05); }
        .hero p { color: #888; font-size: 1.1rem; margin-top: 5px; }

        /* Dashboard Card */
        .card {
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 24px; padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 32px rgba(255, 133, 162, 0.1);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--primary-pink); }
        .stat-label { font-size: 0.8rem; color: #999; }

        /* Gap Alert (Top 10 only) */
        #gap-alert {
            background: #fff0f3; color: #ff4d6d; padding: 10px;
            border-radius: 12px; text-align: center; font-size: 0.9rem;
            margin-top: 15px; display: none; border: 1px dashed var(--primary-pink);
        }

        /* Honor Title */
        .honor-tag {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            background: var(--primary-pink); color: white; font-size: 0.9rem;
            margin-top: 10px; font-weight: bold;
        }

        /* CTA & Recharge */
        .recharge-banner {
            background: linear-gradient(90deg, #ff85a2, #ffac81);
            color: white; padding: 15px; border-radius: 16px;
            text-align: center; margin: 20px 0; cursor: pointer;
        }
        .btn-main {
            background: var(--primary-pink); color: white; width: 100%;
            border: none; padding: 15px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.3);
        }

        /* Leaderboard Table */
        .leaderboard { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .leaderboard th { color: #999; font-size: 0.8rem; text-align: left; padding: 10px; }
        .leaderboard td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .rank-badge { width: 24px; height: 24px; display: inline-block; text-align: center; border-radius: 50%; background: #eee; line-height: 24px; font-size: 0.8rem; }
        .rank-1 { background: gold; color: white; }
        .rank-2 { background: silver; color: white; }
        .rank-3 { background: #cd7f32; color: white; }

        /* Rules */
        .rules { font-size: 0.8rem; color: #888; line-height: 1.6; margin-top: 30px; }

        /* Skeleton Loading */
        .skeleton { background: #eee; height: 20px; border-radius: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="switchLang('tw')">繁</button>
        <button class="lang-btn" onclick="switchLang('en')">EN</button>
        <button class="lang-btn" onclick="switchLang('jp')">JP</button>
    </div>

    <div class="container">
        <div class="hero">
            <h1 id="ui-title">送愛抽萬鑽</h1>
            <p id="ui-subtitle">3/14 - 3/17 白色騎人節</p>
        </div>

        <!-- 個人進度看板 -->
        <div class="card">
            <h3 id="ui-my-status" style="margin-top:0">個人活動進度</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="user-diamond"><div class="skeleton"></div></div>
                    <div class="stat-label" id="ui-label-diamond">累積鑽石</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="user-rank"><div class="skeleton"></div></div>
                    <div class="stat-label" id="ui-label-rank">目前排名</div>
                </div>
            </div>
            <div style="text-align: center;">
                <div id="user-title" class="honor-tag">--</div>
            </div>
            <div id="gap-alert"></div>
        </div>

        <!-- 儲值區 -->
        <div class="recharge-banner" onclick="window.parent.location.href='/recharge'">
            <strong id="ui-recharge-title">💎 快閃補鑽 10% OFF</strong><br>
            <span id="ui-recharge-desc">白色騎人限定優惠，助你衝榜！</span>
        </div>

        <button class="btn-main" onclick="window.parent.location.href='/live'">前往送禮</button>

        <!-- 排行榜 -->
        <div class="card">
            <h3 id="ui-board-title">白色騎士送禮榜 (TOP 20)</h3>
            <table class="leaderboard">
                <thead>
                    <tr>
                        <th id="ui-th-rank">排名</th>
                        <th id="ui-th-user">用戶ID</th>
                        <th id="ui-th-diamond">鑽石</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Data injected by JS -->
                </tbody>
            </table>
        </div>

        <!-- 規則說明 -->
        <div class="rules" id="ui-rules">
            <strong>活動規則：</strong><br>
            1. 於活動期間內，送出指定禮物滿10,000鑽即可獲得抽獎資格。<br>
            2. 活動結束後隨機抽出 50 位用戶發送 10,000 鑽。<br>
            3. TOP 50 可獲得對應稱號之榮耀限定徽章。
        </div>
    </div>

<script>
    const API_BASE = "https://white-valentine-api-905468082258.asia-east1.run.app";
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id') || "Guest";

    const i18n = {
        tw: {
            title: "送愛抽萬鑽", subtitle: "3/14 - 3/17 白色騎人節",
            myStatus: "個人活動進度", labelDiamond: "累積鑽石", labelRank: "目前排名",
            rechargeTitle: "💎 快閃補鑽 10% OFF", rechargeDesc: "白色騎人限定優惠，助你衝榜！",
            cta: "前往送禮", boardTitle: "白色騎士送禮榜 (TOP 20)",
            thRank: "排名", thUser: "用戶 ID", thDiamond: "鑽石",
            gapText: "距離上一名還差 {n} 鑽石",
            titles: { king: "白色騎人國王", earl: "白色騎人伯爵", knight: "白色騎人騎士", guard: "白色騎人侍衛", memorial: "白色騎人紀念", none: "尚未入榜" }
        },
        en: {
            title: "Send Love, Win 10k", subtitle: "3/14 - 3/17 White Valentine",
            myStatus: "My Progress", labelDiamond: "Diamonds", labelRank: "Rank",
            rechargeTitle: "💎 10% OFF Flash Sale", rechargeDesc: "Limited offer to boost your rank!",
            cta: "Send Gifts Now", boardTitle: "White Knight Leaderboard",
            thRank: "Rank", thUser: "User ID", thDiamond: "Diamonds",
            gapText: "{n} diamonds to beat the next rank",
            titles: { king: "White King", earl: "White Earl", knight: "White Knight", guard: "White Guard", memorial: "White Memorial", none: "Unranked" }
        }
    };

    let currentLang = 'tw';

    function getHonorTitle(rank) {
        if (rank === 1) return i18n[currentLang].titles.king;
        if (rank === 2) return i18n[currentLang].titles.earl;
        if (rank === 3) return i18n[currentLang].titles.knight;
        if (rank <= 10) return i18n[currentLang].titles.guard;
        if (rank <= 50) return i18n[currentLang].titles.memorial;
        return i18n[currentLang].titles.none;
    }

    async function fetchData() {
        try {
            // Fetch User Stats
            const userRes = await fetch(`${API_BASE}/get_user_rank?user_id=${userId}`);
            const userData = await userRes.json();
            
            if (userData.status === "success" || userData.status === "not_found") {
                const d = userData.data;
                document.getElementById('user-diamond').innerText = d.diamond_cost.toLocaleString();
                document.getElementById('user-rank').innerText = d.rank;
                document.getElementById('user-title').innerText = getHonorTitle(parseInt(d.rank));
                
                // Gap logic for Top 10
                const gapEl = document.getElementById('gap-alert');
                if (parseInt(d.rank) <= 10 && d.gap > 0) {
                    gapEl.style.display = "block";
                    gapEl.innerText = i18n[currentLang].gapText.replace("{n}", d.gap.toLocaleString());
                }
            }

            // Fetch Leaderboard
            const boardRes = await fetch(`${API_BASE}/get_leaderboard`);
            const boardData = await boardRes.json();
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = "";
            boardData.data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="rank-badge rank-${row.rank}">${row.rank}</span></td>
                    <td>${row.user_id.substring(0, 8)}...</td>
                    <td>${row.diamond_cost.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) { console.error("API Error", e); }
    }

    function switchLang(lang) {
        currentLang = lang === 'tw' ? 'tw' : 'en'; // Simple fallback
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.lang-btn:nth-child(${lang === 'tw' ? 1 : 2})`).classList.add('active');
        
        const l = i18n[currentLang];
        document.getElementById('ui-title').innerText = l.title;
        document.getElementById('ui-subtitle').innerText = l.subtitle;
        document.getElementById('ui-my-status').innerText = l.myStatus;
        document.getElementById('ui-label-diamond').innerText = l.labelDiamond;
        document.getElementById('ui-label-rank').innerText = l.labelRank;
        document.getElementById('ui-recharge-title').innerText = l.rechargeTitle;
        document.getElementById('ui-recharge-desc').innerText = l.rechargeDesc;
        document.querySelector('.btn-main').innerText = l.cta;
        document.getElementById('ui-board-title').innerText = l.boardTitle;
        document.getElementById('ui-th-rank').innerText = l.thRank;
        document.getElementById('ui-th-user').innerText = l.thUser;
        document.getElementById('ui-th-diamond').innerText = l.thDiamond;
        fetchData();
    }

    // Initial Load
    window.onload = () => switchLang('tw');
</script>
</body>
</html>
